}


    // ✨ OBTENER REGIÓN DE CAPTURA SEGÚN LA FORMA
    getCaptureRegion(x, y, width, height) {
        switch (this.geometryType) {
            case 'rectangle':
                return this.getRectangleRegion(x, y, width, height);
                
            case 'trapezoid':
                return this.getTrapezoidRegion(x, y, width, height);
                
            case 'parallelogram':
                return this.getParallelogramRegion(x, y, width, height);
                
            case 'rhombus':
                return this.getRhombusRegion(x, y, width, height);
                
            case 'irregular':
                return this.getIrregularRegion(x, y, width, height);
                
            case 'triangle':
                return this.getTriangleRegion(x, y, width, height);
                
            case 'pentagon':
                return this.getPentagonRegion(x, y, width, height);
                
            default:
                return this.getRectangleRegion(x, y, width, height);
        }
    }

    // ✨ REGIONES ESPECÍFICAS PARA CADA FORMA
    getRectangleRegion(x, y, width, height) {
        return [{
            x: Math.max(0, Math.min(x, canvas.width - width)),
            y: Math.max(0, Math.min(y, canvas.height - height)),
            width: Math.min(width, canvas.width - x),
            height: Math.min(height, canvas.height - y)
        }];
    }

    getTrapezoidRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const topWidth = params.topWidth;
        const bottomWidth = params.bottomWidth;
        const skew = params.skew;
        
        // Dividir el trapecio en múltiples rectángulos horizontales
        const slices = 8;
        const regions = [];
        
        for (let i = 0; i < slices; i++) {
            const ratio = i / slices;
            const sliceWidth = topWidth + (bottomWidth - topWidth) * ratio;
            const sliceX = x + (width - sliceWidth) / 2 + skew * ratio * width;
            const sliceY = y + (height / slices) * i;
            const sliceHeight = height / slices;
            
            if (sliceX >= 0 && sliceY >= 0 && sliceX + sliceWidth <= canvas.width && sliceY + sliceHeight <= canvas.height) {
                regions.push({
                    x: sliceX,
                    y: sliceY,
                    width: sliceWidth,
                    height: sliceHeight
                });
            }
        }
        
        return regions;
    }

    getParallelogramRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const skewX = params.skewX;
        const skewY = params.skewY;
        
        // Dividir en franjas inclinadas
        const slices = 6;
        const regions = [];
        
        for (let i = 0; i < slices; i++) {
            const ratio = i / slices;
            const sliceX = x + skewX * ratio * width;
            const sliceY = y + skewY * ratio * height + (height / slices) * i;
            const sliceWidth = width / slices;
            const sliceHeight = height / slices;
            
            if (sliceX >= 0 && sliceY >= 0 && sliceX + sliceWidth <= canvas.width && sliceY + sliceHeight <= canvas.height) {
                regions.push({
                    x: sliceX,
                    y: sliceY,
                    width: sliceWidth,
                    height: sliceHeight
                });
            }
        }
        
        return regions;
    }

    getRhombusRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const centerX = x + width / 2;
        const centerY = y + height / 2;
        
        // Dividir el rombo en rectángulos concéntricos
        const rings = 5;
        const regions = [];
        
        for (let ring = 0; ring < rings; ring++) {
            const ratio = (ring + 1) / rings;
            const ringWidth = width * ratio * 0.7;
            const ringHeight = height * ratio * params.ratio;
            
            const ringX = centerX - ringWidth / 2;
            const ringY = centerY - ringHeight / 2;
            
            if (ringX >= 0 && ringY >= 0 && ringX + ringWidth <= canvas.width && ringY + ringHeight <= canvas.height) {
                regions.push({
                    x: ringX,
                    y: ringY,
                    width: ringWidth,
                    height: ringHeight
                });
            }
        }
        
        return regions;
    }

    getIrregularRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const vertices = params.vertices;
        const centerX = x + width / 2;
        const centerY = y + height / 2;
        
        // Aproximar la forma irregular con múltiples rectángulos pequeños
        const regions = [];
        const gridSize = 8;
        
        for (let gx = 0; gx < gridSize; gx++) {
            for (let gy = 0; gy < gridSize; gy++) {
                const localX = (gx / gridSize - 0.5) * 2; // -1 a 1
                const localY = (gy / gridSize - 0.5) * 2; // -1 a 1
                
                // Verificar si este punto está dentro de la forma irregular
                if (this.pointInIrregularShape(localX, localY, vertices)) {
                    const rectX = centerX + localX * width / 2;
                    const rectY = centerY + localY * height / 2;
                    const rectWidth = width / gridSize;
                    const rectHeight = height / gridSize;
                    
                    if (rectX >= 0 && rectY >= 0 && rectX + rectWidth <= canvas.width && rectY + rectHeight <= canvas.height) {
                        regions.push({
                            x: rectX,
                            y: rectY,
                            width: rectWidth,
                            height: rectHeight
                        });
                    }
                }
            }
        }
        
        return regions;
    }

    getTriangleRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const regions = [];
        
        // Dividir el triángulo en franjas horizontales
        const slices = 6;
        
        for (let i = 0; i < slices; i++) {
            const ratio = i / slices;
            let sliceWidth, sliceX;
            
            switch (params.type) {
                case 0: // Equilátero
                    sliceWidth = width * (1 - ratio);
                    sliceX = x + (width - sliceWidth) / 2;
                    break;
                case 1: // Isósceles
                    sliceWidth = width * (1 - ratio * 0.8);
                    sliceX = x + (width - sliceWidth) / 2;
                    break;
                default: // Escaleno
                    sliceWidth = width * (1 - ratio * (0.6 + Math.random() * 0.4));
                    sliceX = x + (Math.random() - 0.3) * width * 0.3;
                    break;
            }
            
            const sliceY = y + (height / slices) * i;
            const sliceHeight = height / slices;
            
            if (sliceX >= 0 && sliceY >= 0 && sliceX + sliceWidth <= canvas.width && sliceY + sliceHeight <= canvas.height) {
                regions.push({
                    x: sliceX,
                    y: sliceY,
                    width: sliceWidth,
                    height: sliceHeight
                });
            }
        }
        
        return regions;
    }

    getPentagonRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const centerX = x + width / 2;
        const centerY = y + height / 2;
        const regions = [];
        
        // Crear un pentágono aproximado con rectángulos
        const angles = 5;
        for (let i = 0; i < angles; i++) {
            const angle = (i / angles) * Math.PI * 2 + params.rotation;
            const radius = (width + height) / 4;
            const irregularity = params.irregularity;
            
            const radiusVariation = 1 + (Math.random() - 0.5) * irregularity;
            const finalRadius = radius * radiusVariation;
            
            const pointX = centerX + Math.cos(angle) * finalRadius;
            const pointY = centerY + Math.sin(angle) * finalRadius;
            
            // Crear pequeños rectángulos alrededor de cada vértice
            const rectSize = Math.min(width, height) / 6;
            const rectX = pointX - rectSize / 2;
            const rectY = pointY - rectSize / 2;
            
            if (rectX >= 0 && rectY >= 0 && rectX + rectSize <= canvas.width && rectY + rectSize <= canvas.height) {
                regions.push({
                    x: rectX,
                    y: rectY,
                    width: rectSize,
                    height: rectSize
                });
            }
        }
        
        return regions;
    }

    // ✨ FUNCIÓN AUXILIAR PARA VERIFICAR SI UN PUNTO ESTÁ DENTRO DE UNA FORMA IRREGULAR
    pointInIrregularShape(x, y, vertices) {
        let inside = false;
        const n = vertices.length;
        
        for (let i = 0, j = n - 1; i < n; j = i++) {
            const xi = vertices[i].x, yi = vertices[i].y;
            const xj = vertices[j].x, yj = vertices[j].y;
            
            if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
                inside = !inside;
            }
        }
        
        return inside;
    }

    reset() {
        Object.assign(this, this.params);
        this.x = random(canvas.width);
        this.y = random(canvas.height);
        this.toDelete = false;
        this.age = 0;
        
        // Regenerar forma aleatoria
        this.geometryType = this.geometryTypes[Math.floor(Math.random() * this.geometryTypes.length)];
        this.shapeParameters = this.generateShapeParameters();
        
        // Resetear propiedades de arcos
        this.arc = {
            x: (Math.random() - 0.5) * 0.15,
            y: (Math.random() - 0.5) * 0.15
        };
        
        this.secondStroke = {
            x: this.x + (Math.random() - 0.5) * 100,
            y: this.y + (Math.random() - 0.5) * 100,
            change: {
                x: this.change.x + (Math.random() - 0.5) * 0.8,
                y: this.change.y + (Math.random() - 0.5) * 0.8
            },
            arc: {
                x: (Math.random() - 0.9) * 0.12,
                y: (Math.random() - 0.9) * 0.12
            }
        };
        
        this.arcIntensity = 0.8 + Math.random() * 0.4;
        this.arcFrequency = 0.02 + Math.random() * 0.05;
        
        console.log(`🔄 Distorsión regenerada: ${this.geometryType}`);
    }

    applyFluidColorEffects(imageData, change) {
    const data = imageData.data;
    
    // Evolucionar el color fluido con el tiempo
    this.fluidColorSeed += this.colorEvolutionSpeed;
    if (this.fluidColorSeed > 360) this.fluidColorSeed -= 360;
    
    // Generar colores fluidos basados en la semilla evolutiva
    const fluidHue = this.fluidColorSeed;
    const fluidSat = 50 + Math.sin(this.age * 0.01) * 30;
    const fluidLight = 40 + Math.cos(this.age * 0.008) * 20;
    
    for (let i = 0; i < data.length; i += 4) {
        if (Math.random() > 0.88) {
            // Aplicar transformaciones de color fluidas
            const colorIntensity = Math.sin(this.age * 0.03 + i * 0.0001) * 25;
            const fluidR = Math.sin(fluidHue * Math.PI / 180) * colorIntensity;
            const fluidG = Math.sin((fluidHue + 120) * Math.PI / 180) * colorIntensity;
            const fluidB = Math.sin((fluidHue + 240) * Math.PI / 180) * colorIntensity;
            
            data[i] = Math.min(255, Math.max(0, data[i] + fluidR));
            data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + fluidG));
            data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + fluidB));
            
            // Ocasionalmente aplicar efectos más dramáticos
            if (Math.random() > 0.95) {
                const dramatic = Math.sin(this.age * 0.05) * 40;
                data[i] = Math.min(255, Math.max(0, data[i] + dramatic));
                data[i + 1] = Math.min(255, Math.max(0, data[i + 1] - dramatic * 0.5));
                data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + dramatic * 0.8));
            }
        }
    }
}

    draw() {
        if (this.toDelete) return;
        
        this.age++;
        if (this.age > this.lifespan) {
            this.toDelete = true;
            return;
        }

        this.updateSize(); // Añadir esta línea

        if (this.width < 1) this.width = 60;
        if (this.height < 1) this.height = 60;

        // ✨ DIBUJAR PRIMER TRAZO CON FORMA IRREGULAR
        this.drawIrregularStroke(this.x, this.y, this.width, this.height, this.change, this.arc);
        
        // ✨ DIBUJAR SEGUNDO TRAZO CON FORMA IRREGULAR
        this.drawIrregularStroke(
            this.secondStroke.x, 
            this.secondStroke.y, 
            this.width * 0.7,
            this.height * 0.7, 
            this.secondStroke.change, 
            this.secondStroke.arc
        );

        // Actualizar posición principal con arco
        this.x += this.change.x;
        this.y += this.change.y;
        this.change.x += this.arc.x * this.arcIntensity;
        this.change.y += this.arc.y * this.arcIntensity;

        // Actualizar segundo trazo
        this.secondStroke.x += this.secondStroke.change.x;
        this.secondStroke.y += this.secondStroke.change.y;
        this.secondStroke.change.x += this.secondStroke.arc.x * this.arcIntensity;
        this.secondStroke.change.y += this.secondStroke.arc.y * this.arcIntensity;

        // ✨ VARIACIÓN DINÁMICA DE ARCOS Y FORMAS
        if (Math.random() > 0.85) {
            this.arc.x += (Math.random() - 0.5) * 0.1;
            this.arc.y += (Math.random() - 0.5) * 0.1;
            
            this.secondStroke.arc.x += (Math.random() - 0.5) * 0.08;
            this.secondStroke.arc.y += (Math.random() - 0.5) * 0.08;
            
            // Ocasionalmente cambiar de forma geométrica
            if (Math.random() > 0.95) {
                this.geometryType = this.geometryTypes[Math.floor(Math.random() * this.geometryTypes.length)];
                this.shapeParameters = this.generateShapeParameters();
                console.log(`🔀 Forma cambiada a: ${this.geometryType}`);
            }
            
            if (Math.random() > 0.7) {
                this.change.x += (Math.random() - 0.5) * 0.5;
                this.change.y += (Math.random() - 0.5) * 0.5;
                this.secondStroke.change.x += (Math.random() - 0.5) * 0.4;
                this.secondStroke.change.y += (Math.random() - 0.5) * 0.4;
            }
        }

        // Intensidad de arco variable con la edad
        this.arcIntensity = 0.3 + Math.sin(this.age * this.arcFrequency) * 0.3;
        
        // Limitar los arcos
        this.arc.x = Math.max(-0.3, Math.min(0.3, this.arc.x));
        this.arc.y = Math.max(-0.3, Math.min(0.3, this.arc.y));
        this.secondStroke.arc.x = Math.max(-0.25, Math.min(0.25, this.secondStroke.arc.x));
        this.secondStroke.arc.y = Math.max(-0.25, Math.min(0.25, this.secondStroke.arc.y));
    }

    // ✨ FUNCIÓN PRINCIPAL PARA DIBUJAR FORMAS IRREGULARES
    drawIrregularStroke(x, y, width, height, change, arc) {
        const regions = this.getCaptureRegion(x, y, width, height);
        
        regions.forEach(region => {
            if (region.width > 0 && region.height > 0) {
                let imageData = ctx.getImageData(region.x, region.y, region.width, region.height);
                
                let newX = region.x + change.x;
                let newY = region.y + change.y;
                
                // Wrapping mejorado
                if (newX < 0) newX = canvas.width + newX;
                if (newX >= canvas.width) newX = newX - canvas.width;
                if (newY < 0) newY = canvas.height + newY;
                if (newY >= canvas.height) newY = newY - canvas.height;
                
                // ✨ APLICAR EFECTOS ESPECÍFICOS SEGÚN LA FORMA
                this.applyShapeSpecificEffects(imageData, change);
                
                ctx.putImageData(imageData, newX, newY);
            }
        });
    }

        }
    }
}        // Función para procesar todas las colisiones
        function processCollisions() {
            setSeed(seed);
            const activeParticles = particles.filter(p => !p.toDelete && !p.done);
            
            for (let i = 0; i < activeParticles.length; i++) {
                for (let j = i + 1; j < activeParticles.length; j++) {
                    const particle1 = activeParticles[i];
                    const particle2 = activeParticles[j];
                    
                    // Solo procesar si ambas partículas no están en cooldown
                    if (particle1.collisionCooldown === 0 && particle2.collisionCooldown === 0) {
                        if (detectCollision(particle1, particle2)) {
                            const behavior = decideCollisionBehavior(particle1, particle2);
                            executeCollisionBehavior(behavior, particle1, particle2, i, j);
                            
                            // Establecer cooldown para evitar colisiones múltiples
                            particle1.collisionCooldown = 10;
                            particle2.collisionCooldown = 10;
                        }
                    }
                }
            }
        }

        // Función para limpiar partículas marcadas para eliminación
        function cleanupParticles() {
            particles = particles.filter(p => !p.toDelete);
            distortions = distortions.filter(d => !d.toDelete);
        }

        // Función para renovar reglas de movimiento (menos drástica)
function renewMovementRules() {
    setSeed(seed);
    console.log('🔄 Ajustando reglas de movimiento sutilmente');
    
    // Tu código existente para partículas...
    particles.forEach(particle => {
        if (!particle.toDelete && Math.random() > 0.6) {
            particle.direction.x += (Math.random() - 0.5) * 0.5;
            particle.direction.y += (Math.random() - 0.5) * 0.5;
            particle.arc.x += (Math.random() - 0.7) * 0.505;
            particle.arc.y += (Math.random() - 0.7) * 0.505;
        }
    });
    
    // NUEVO: También cambiar comportamientos de tamaño ocasionalmente
    if (Math.random() > 0.6) { // 30% de probabilidad
        changeSizeBehaviors();
    }
    
    // Tu código existente para distorsiones...
    distortions.forEach(distortion => {
        if (!distortion.toDelete && Math.random() > 0.4) {
            distortion.change.x += (Math.random() - 0.5) * 0.5;
            distortion.change.y += (Math.random() - 0.5) * 0.5;
        }
    });
    
    // Tu código existente para crear nuevas distorsiones...
    if (Math.random() > 0.85) {
        const newDistortionCount = random(4) + 3;
    for (let i = 0; i < newDistortionCount; i++) {
        const distortion = new SequencedPixelDistortion({
            x: random(canvas.width),
            y: random(canvas.height),
            width: random(80) + 30,    // Tamaños más pequeños
            height: random(80) + 30,   // Tamaños más pequeños
            change: {
                x: (random(3) - 1) * 0.4,  // Movimiento más lento
                y: (random(3) - 1) * 0.4
            }
      distortions.push(distortion);  });
        }
    }
}

        function changeSizeBehaviors() {
    distortions.forEach((distortion, index) => {
        if (!distortion.toDelete && Math.random() < 0.8) { // 30% de distorsiones cambian
            const oldType = distortion.sizeChangeType;
            distortion.sizeChangeType = distortion.chooseSizeChangeType();
            if (oldType !== distortion.sizeChangeType) {
                console.log(`🔄 Distorsión #${index} cambió de ${oldType} a ${distortion.sizeChangeType}`);
            }
        }
    });
}
         setSeed(seed);
        // Crear partículas y distorsiones iniciales con velocidades más lentas
        let particles = [];
        
        for (let i = 0; i < 25; i++) {
            particles.push(new SequencedTextParticle({
                x: random(canvas.width),
                y: random(canvas.height),
                width: random(100) + 40,
                height: random(100) + 40,
                direction: {
                    x: (random(3) - 1) * 0.8,
                    y: (random(3) - 1) * 0.8
                },
                arc: {
                    x: (random(3) - 1) * 0.05,
                    y: (random(3) - 1) * 0.05
                },
                speed: 0.0003 + Math.random() * 0.7,
                maxDistance: random(400) + 1200,
                colorShift: {
                    r: random(60) - 30,
                    g: random(60) - 30,
                    b: random(60) - 30
                }
            }));
        }
        
        let distortions = [];
        let distortionCount = random(5) + 10;
        for (let i = 0; i < distortionCount; i++) {
            const distortion = new SequencedPixelDistortion({
                x: random(canvas.width),
                y: random(canvas.height),
                width: random(150) + 50,
                height: random(150) + 50,
                change: {
                    x: (random(3) - 1) * 1,
                    y: (random(3) - 1) * 1
                }
            });
            
            distortions.push(distortion);
            console.log(`🎯 Distorsión inicial #${i} - Tipo: ${distortion.sizeChangeType}`);
        }

        // Variables de control con tiempo aleatorio
        let useFirstSet = true;
        let lastTextRedraw = Date.now();
        let frameCount = 0;
        let nextRedrawTime = (5 + Math.random() * 7) * 1000; // Entre 15 y 35 segundos
        let lastCollisionCheck = 0;
        let collisionCheckInterval = 100; // Verificar colisiones cada 100ms

        // Función para regenerar partículas caóticas (más controlada)
        function regenerateParticles() {
            setSeed(seed);
            console.log('🔄 Agregando nuevas partículas caóticas');
            const newParticleCount = 14 + random(45); // Entre 5-15 partículas
            
            for (let i = 0; i < newParticleCount; i++) {
                particles.push(new SequencedTextParticle({
                    x: random(canvas.width),
                    y: random(canvas.height),
                    width: random(180) + 40,
                    height: random(180) + 40,
                    direction: {
                        x: (random(3) - 1) * 0.6,
                        y: (random(3) - 1) * 0.6
                    },
                    arc: {
                        x: (random(3) - 1) * 0.08,
                        y: (random(3) - 1) * 0.08
                    },
                    speed: 0.0002 + Math.random() * 0.5,
                    maxDistance: random(400) + 1000,
                    colorShift: {
                        r: random(80) - 40,
                        g: random(80) - 40,
                        b: random(80) - 40
                    }
                }));
            }
        }

        // Función para regenerar distorsiones rectangulares
        function regenerateDistortions() {
    setSeed(seed);
    console.log('🔲 Agregando nuevas distorsiones rectangulares con tamaños dinámicos');
    const newDistortionCount = 7 + random(14); // Entre 8-20 distorsiones
    
    for (let i = 0; i < newDistortionCount; i++) {
        // Crear distorsión con comportamiento de tamaño aleatorio
        const distortion = new SequencedPixelDistortion({
            x: random(canvas.width),

            width: random(120) + 40,

        distortions.push(distortion);
        
        // Opcional: Log del tipo de comportamiento para debug
        console.log(`📏 Nueva distorsión con comportamiento: ${distortion.sizeChangeType}`);
    }
}

    // Función para verificar y mantener ambos sistemas activos
        function maintainSystemHealth() {
            const activeParticles = particles.filter(p => !p.toDelete && !p.done).length;
            const activeDistortions = distortions.filter(d => !d.toDelete).length;
            
            // Sistema 1: Partículas caóticas - mantener entre 15-30
            if (activeParticles < 25) {
                console.log(`⚠️ Pocas partículas activas (${activeParticles}), agregando más...`);
                regenerateParticles();
            }
            
            // Sistema 2: Distorsiones rectangulares - mantener entre 8-20
            if (activeDistortions < 18) {
                console.log(`⚠️ Pocas distorsiones activas (${activeDistortions}), agregando más...`);
                regenerateDistortions();
            }
        }

        // Loop de animación principal con auto-regeneración
        function animate() {
             setSeed(seed);
            if (!canvasAnimationStarted) return;
            
            requestAnimationFrame(animate);
            frameCount++;

            // Redibujar texto en intervalos aleatorios
            if (Date.now() - lastTextRedraw > nextRedrawTime) {
                drawColoredText();
                regenerateParticles(); 
                lastTextRedraw = Date.now();
                
                // 50% de probabilidad de ajustar sutilmente las reglas
                if (Math.random() < 0.5) {
                    renewMovementRules();
                    setSeed(seed);
                }
                
                // Calcular siguiente tiempo aleatorio (15-35 segundos)
                setSeed(seed);
                nextRedrawTime = (7 + Math.random() * 7) * 1000;
                console.log(`⏰ Próximo redibujado en ${(nextRedrawTime/1000).toFixed(1)} segundos`);
                
                // Intentar leer nuevo texto del output de Tracery
                readTraceryOutput();
            }

            // Procesar colisiones cada cierto intervalo
            if (Date.now() - lastCollisionCheck > collisionCheckInterval) {
                processCollisions();
                lastCollisionCheck = Date.now();
            }

            // SISTEMA 1: Dibujar partículas caóticas (SIEMPRE ACTIVO)
            particles.forEach(particle => particle.draw());

            // Control dinámico del número de partículas caóticas
            const activeParticleCount = particles.filter(p => !p.toDelete && !p.done).length;
            
            if (particles.length > 120) {
                // Eliminar exceso pero mantener los activos
                particles = particles.filter(p => !p.toDelete).slice(-40);
            }

            // SISTEMA 2: Dibujar distorsiones rectangulares
            distortions.forEach(d => {
                if (Math.random() > 0.4) { // 90% de probabilidad de dibujar
                    d.draw();
                }
            });

            // Control dinámico de distorsiones rectangulares
            const activeDistortionCount = distortions.filter(d => !d.toDelete).length;
            
            if (distortions.length > 30) {
                // Limpiar exceso
                distortions = distortions.filter(d => !d.toDelete).slice(-60);
            }

            // Limpiar elementos marcados para eliminación
            if (frameCount % 50 === 0) { // Cada segundo aproximadamente
                cleanupParticles();
                maintainSystemHealth(); // Verificar salud de ambos sistemas
            }

            // Crear nuevas distorsiones rectangulares ocasionalmente
            if (Math.random() > 0.995) {
                distortions.push(new SequencedPixelDistortion({
                    x: random(canvas.width),
                    y: random(canvas.height),
                    width: random(190) + 40,
                    height: random(190) + 40,
                    change: {
                        x: (random(3) - 1) * 1.5,
                        y: (random(3) - 1) * 1.5
                    }
                }));
            }

            // Regeneración suave cada 30 segundos
            if (frameCount % 120 === 0) { // Cada 30 segundos aprox
                console.log('🔄 Regeneración suave programada');
                if (Math.random() < 0.5) regenerateParticles();
                if (Math.random() < 0.5) regenerateDistortions();
            }
        }

        // NO iniciar automáticamente - esperar a que Tracery esté listo
        // La función startCanvasAnimation() se llamará cuando se detecte texto de Tracery
    </script>
