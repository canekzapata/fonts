  <meta name="description" content="This piece is a machine that watches through the pixel and pushes it, bifurcates it, lets it tremble. A black canvas, a malleable matrix: the texts that Tracery.js spits out are caught mid-air by JavaScript, shattered, painted, shadowed, and scattered again in floating fragments, each bearing the shadow of a collision that perhaps never occurred.

The system is double, like the things that survive: erratic particles seeking their path by crashing into each other, absorbing or destroying one another; distortions crawling like twisted glyphs, scratching the canvas with delay, with double strokes, as if time forked at every second.

This piece owes much to Kim Asendorf, d0n_xyz, and lilcode, who have deeply explored pixel manipulation in the browser. Here, Tracery.js prints the characters of bot, and JS plays with the screen’s pixels. The bot system is an old one I began working on in 2017 (https://canekzapata.net/twbot/index.html), and it spent some time posting on Twitter before the new management shut the door on such automations. It’s a bot I care for deeply, it must be said.

There is no plot, no scene, no voice guiding the whole, but rather a multiplication of machinic decisions without subject, a swarm of instructions producing effects without intent, where algorithms do not narrate, do not signify: they calculate. The particles are unaware they chase each other, unaware they leave traces. What happens is not representation but insistence: an insistence on collapse, on friction, on escape. Everything we call “expression” in language is here merely a thermodynamic drift.

It is not image art but failed translation, of light that doesn't fit the loops, of margins dissolving under pulses of code. JS does not display the text—it subjects it to a choreography of displacements where every letter becomes a noise on the screen, a shadow of something that may never have been said.

And if something remains, if anything persists, it is not meaning or form: it is the technical echo of a broken system that insists on becoming visible.

Each minted piece is one among millions of possible variants: while it retains certain fixed ideas determined by its seed—such as the base text, the color palette, and a general motion logic—the final result shifts, mutates, produces iterations that resist exact repetition. It is never the same resolution of the system. Each piece insists, yes, but insists differently.

    <!-- Script para leer el output de Tracery y sincronizar -->
     let generatedTexts = [];
  let canvasAnimationStarted = false;
  let traceryTextReady = false;

  // —— Debounce para lecturas de Tracery ——  
  let lastReadTime = 0;
  const READ_DEBOUNCE_MS = 10000;  // mínimo 3 s entre lecturas

  // Función para leer el contenido del div #output y convertirlo en array
  function readTraceryOutput() {
    // Si estamos dentro del periodo de debounce, no hacemos nada
    if (Date.now() - lastReadTime < READ_DEBOUNCE_MS) return false;
    lastReadTime = Date.now();

    const outputDiv = document.getElementById('output');
    if (outputDiv && outputDiv.innerHTML.trim() !== '') {
      // Obtener todos los divs con clase "outputSample"
      const outputSamples = outputDiv.querySelectorAll('.outputSample');

      if (outputSamples.length > 0) {
        generatedTexts = Array.from(outputSamples).map(div => div.textContent || div.innerText);
      } else {
        // Si no, dividir por <br> o tomar todo el texto
        const text = outputDiv.innerHTML.replace(/<br\s*\/?>/gi, '|BREAK|');
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = text;
        const plainText = tempDiv.textContent || tempDiv.innerText;
        generatedTexts = plainText.split('|BREAK|').filter(t => t.trim() !== '');
      }

      // Si solo hay un texto, duplicarlo para tener variedad
      if (generatedTexts.length === 1) {
        const singleText = generatedTexts[0];
        generatedTexts = [singleText, singleText, singleText, singleText];
      }

      traceryTextReady = true;
      if (!canvasAnimationStarted && generatedTexts.length > 0) {
        startCanvasAnimation();
      }

      return true;
    }
    return false;
  }

  // Función para iniciar la animación del canvas
  function startCanvasAnimation() {
    if (canvasAnimationStarted) return;
    canvasAnimationStarted = true;
    setSeed(seed);
    if (typeof buildTextRevealQueue === 'function') buildTextRevealQueue();
    if (typeof animate === 'function') animate();
  }

  // Observador de mutaciones en #output
  const outputObserver = new MutationObserver((mutations) => {
    let hasTextualChanges = false;
    mutations.forEach(m => {
      if ((m.type === 'childList' && m.addedNodes.length > 0) ||
          m.type === 'characterData') {
        hasTextualChanges = true;
      }
    });
    if (hasTextualChanges) {
      readTraceryOutput();
      setTimeout(readTraceryOutput, 90000);
    }
  });

  // Verificar contenido inicial
  function checkForInitialContent() {
    const outputDiv = document.getElementById('output');
    if (outputDiv && outputDiv.innerHTML.trim() !== '') {
      readTraceryOutput();
      return true;
    }
    return false;
  }

  // Al cargar el DOM, configuramos el observador y comprobaciones
  document.addEventListener('DOMContentLoaded', () => {
    const outputDiv = document.getElementById('output');
    if (outputDiv) {
      outputObserver.observe(outputDiv, {
        childList: true,
        subtree: true,
        characterData: true
      });
      setTimeout(() => checkForInitialContent(), 100);
      setTimeout(() => checkForInitialContent(), 500);
      setTimeout(() => checkForInitialContent(), 1000);
      setTimeout(() => checkForInitialContent(), 2000);
    }
  });


  // Respaldo agresivo al inicio
  let initialCheckCount = 0;
  const initialChecker = setInterval(() => {
    initialCheckCount++;
    if (!traceryTextReady && checkForInitialContent()) {
      clearInterval(initialChecker);
    } else if (initialCheckCount > 10) {
      clearInterval(initialChecker);
      if (!canvasAnimationStarted) {
        generatedTexts = ["Esperando texto de Tracery..."];
        startCanvasAnimation();
      }
    }
  }, 2000);

        // Función para modificar color
        function adjustColor(color, amount) {
            let usePound = false;
            if (color[0] == "#") {
                color = color.slice(1);
                usePound = true;
            }
            let num = parseInt(color, 16);
            let r = (num >> 16) + amount;
            if (r > 255) r = 255;
            else if (r < 0) r = 0;
            let g = ((num >> 8) & 0x00FF) + amount;
            if (g > 255) g = 255;
            else if (g < 0) g = 0;
            let b = (num & 0x0000FF) + amount;
            if (b > 255) b = 255;
            else if (b < 0) b = 0;
            return (usePound ? "#" : "") + (b | (g << 8) | (r << 16)).toString(16);
        }

 class RecursiveColorGenerator {
    constructor() {
        // Inicializar semillas de color correctamente
        this.colorSeeds = [
            { h: Math.random() * 360, s: 60 + Math.random() * 40, l: 50 + Math.random() * 30 },
            { h: Math.random() * 360, s: 60 + Math.random() * 40, l: 50 + Math.random() * 30 },
            { h: Math.random() * 360, s: 60 + Math.random() * 40, l: 50 + Math.random() * 30 }
        ];
        this.currentGeneration = 0;
        this.evolutionHistory = [[], [], []]; // Inicializar arrays vacíos
        
    }

    generateRecursiveColor(depth = 0, baseIndex = null) {
        // Verificar que colorSeeds existe y tiene elementos
        if (!this.colorSeeds || this.colorSeeds.length === 0) {
            console.warn('⚠️ colorSeeds no inicializado, reinicializando...');
            this.reinitializeSeeds();
        }

        if (depth > 4) {
            const base = this.colorSeeds[Math.floor(Math.random() * this.colorSeeds.length)];
            return `hsl(${Math.round(base.h)}, ${Math.round(base.s)}%, ${Math.round(base.l)}%)`;
        }

        // Seleccionar color padre de forma segura
        const parentIndex = baseIndex !== null ? 
            Math.max(0, Math.min(baseIndex, this.colorSeeds.length - 1)) : 
            Math.floor(Math.random() * this.colorSeeds.length);
            
        const parentColor = this.colorSeeds[parentIndex];
        
        // Verificar que el color padre existe
        if (!parentColor || typeof parentColor.h === 'undefined') {
            console.warn('⚠️ Color padre inválido, usando color por defecto');
            return `hsl(${Math.random() * 360}, 70%, 50%)`;
        }
        
        // Variación que decrece con la profundidad
        const variation = 40 - (depth * 8);
        
        const newColor = {
            h: (parentColor.h + (Math.random() - 0.5) * variation) % 360,
            s: Math.max(20, Math.min(100, parentColor.s + (Math.random() - 0.5) * variation)),
            l: Math.max(20, Math.min(80, parentColor.l + (Math.random() - 0.5) * variation))
        };

        // Asegurar que los valores sean números válidos
        newColor.h = isNaN(newColor.h) ? Math.random() * 360 : newColor.h;
        newColor.s = isNaN(newColor.s) ? 70 : newColor.s;
        newColor.l = isNaN(newColor.l) ? 50 : newColor.l;

        // Recursión: 30% probabilidad de generar un color hijo
        if (Math.random() > 0.7 && depth < 3) { // Limitar recursión para evitar stack overflow
            return this.generateRecursiveColor(depth + 1, parentIndex);
        }

        return `hsl(${Math.round(newColor.h)}, ${Math.round(newColor.s)}%, ${Math.round(newColor.l)}%)`;
    }

    // Función para reinicializar semillas en caso de error
    reinitializeSeeds() {
        this.colorSeeds = [
            { h: Math.random() * 360, s: 60 + Math.random() * 40, l: 50 + Math.random() * 30 },
            { h: Math.random() * 360, s: 60 + Math.random() * 40, l: 50 + Math.random() * 30 },
            { h: Math.random() * 360, s: 60 + Math.random() * 40, l: 50 + Math.random() * 30 }
        ];
        this.evolutionHistory = [[], [], []];
    }

    // Generar color de sombra fluido basado en el color principal
    generateFluidShadowColor(baseColor, intensity = 1) {
        // Extraer HSL del color base si es posible
        const match = baseColor.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);
        if (match) {
            const [, h, s, l] = match.map(Number);
            
            // Crear sombra complementaria con variación fluida
            const shadowH = (h + 120 + (Math.random() - 0.5) * 60) % 360;
            const shadowS = Math.max(30, Math.min(100, s + (Math.random() - 0.5) * 40));
            const shadowL = Math.max(10, Math.min(60, l - 20 + (Math.random() - 0.5) * 30));
            
            return `hsl(${Math.round(shadowH)}, ${Math.round(shadowS)}%, ${Math.round(shadowL)}%)`;
        }
        
        // Fallback para colores que no son HSL
        const fallbackH = Math.random() * 360;
        const fallbackS = 60 + Math.random() * 40;
        const fallbackL = 30 + Math.random() * 30;
        
        return `hsl(${Math.round(fallbackH)}, ${Math.round(fallbackS)}%, ${Math.round(fallbackL)}%)`;
    }

    // Evolucionar los colores semilla gradualmente (VERSIÓN CORREGIDA)
    evolveColorSeeds() {
        // Verificar que colorSeeds existe
        if (!this.colorSeeds || this.colorSeeds.length === 0) {
            console.warn('⚠️ No hay semillas para evolucionar, reinicializando...');
            this.reinitializeSeeds();
            return;
        }

        // Evolucionar cada semilla de forma segura
        this.colorSeeds = this.colorSeeds.map((color, index) => {
            // Verificar que el color existe y tiene las propiedades necesarias
            if (!color || typeof color.h === 'undefined' || typeof color.s === 'undefined' || typeof color.l === 'undefined') {
                console.warn(`⚠️ Color en índice ${index} inválido, regenerando...`);
                return {
                    h: Math.random() * 360,
                    s: 60 + Math.random() * 40,
                    l: 50 + Math.random() * 30
                };
            }

            const evolution = {
                h: (color.h + (Math.random() - 0.5) * 15) % 360,
                s: Math.max(20, Math.min(100, color.s + (Math.random() - 0.5) * 8)),
                l: Math.max(20, Math.min(80, color.l + (Math.random() - 0.5) * 8))
            };
            
            // Asegurar que los valores evolucionados sean válidos
            evolution.h = isNaN(evolution.h) ? Math.random() * 360 : evolution.h;
            evolution.s = isNaN(evolution.s) ? 70 : evolution.s;
            evolution.l = isNaN(evolution.l) ? 50 : evolution.l;
            
            // Guardar historial para patrones de forma segura
            if (!this.evolutionHistory[index]) {
                this.evolutionHistory[index] = [];
            }
            this.evolutionHistory[index].push(evolution);
            if (this.evolutionHistory[index].length > 10) {
                this.evolutionHistory[index].shift();
            }
            
            return evolution;
        });
        
        this.currentGeneration++;
    }

    // Generar paleta fluida completa
    generateFluidPalette() {
        try {
            const textColor = this.generateRecursiveColor(0);
            const bgColor = this.generateRecursiveColor(1, 1);
            const shadowColor = this.generateFluidShadowColor(textColor);
            
            return { textColor, bgColor, shadowColor };
        } catch (error) {
            console.error('⚠️ Error generando paleta fluida:', error);
            // Fallback seguro
            return {
                textColor: `hsl(${Math.random() * 360}, 70%, 60%)`,
                bgColor: `hsl(${Math.random() * 360}, 50%, 40%)`,
                shadowColor: `hsl(${Math.random() * 360}, 80%, 30%)`
            };
        }
    }

    // Método para verificar la salud del generador
    checkHealth() {
        const isHealthy = this.colorSeeds && 
                         this.colorSeeds.length === 3 && 
                         this.colorSeeds.every(color => 
                             color && 
                             typeof color.h === 'number' && 
                             typeof color.s === 'number' && 
                             typeof color.l === 'number'
                         );
        
        if (!isHealthy) {
            console.warn('🔧 Generador de colores no saludable, reparando...');
            this.reinitializeSeeds();
        }
        
        return isHealthy;
    }


}

const fluidColorGenerator = new RecursiveColorGenerator();


        // ─── Sistema de reveal progresivo ("agua al río") ───────────────
        let textRevealQueue = [];
        let lastRevealTime  = 0;
        const REVEAL_INTERVAL_MS = 90; // ~11 palabras/segundo

        // Construye la cola de palabras para reveal: múltiples instancias
        // del bot con distintos tamaños y posiciones mezcladas.
        function buildTextRevealQueue() {
            textRevealQueue = [];
            fluidColorGenerator.evolveColorSeeds();

            // Clusters: [número de instancias, tamaño mín px, tamaño máx px]
            const clusters = [
                { count: 2, minSize: 90, maxSize: 135 }, // grandes
                { count: 3, minSize: 30, maxSize: 60  }, // medianos
                { count: 5, minSize: 12, maxSize: 26  }, // pequeños / densos
            ];

            clusters.forEach(cluster => {
                for (let c = 0; c < cluster.count; c++) {
                    // Obtener texto: preferir grammar global, caer en generatedTexts
                    let text = window.currentGrammar
                        ? window.currentGrammar.flatten('#origin#')
                        : (generatedTexts[Math.floor(Math.random() * generatedTexts.length)] || '');
                    if (!text) return;

                    const fontSize   = Math.round(cluster.minSize + Math.random() * (cluster.maxSize - cluster.minSize));
                    const fontFamily = getRandomFont();
                    const margin     = 30;
                    const startX     = margin + Math.random() * (canvas.width  - margin * 2 - 150);
                    const startY     = fontSize + Math.random() * (canvas.height - fontSize * 3);

                    ctx.font = `${fontSize}px ${fontFamily}`;
                    const words = text.split(/\s+/).filter(w => w.length > 0);
                    let cx = startX;
                    let cy = startY;

                    words.forEach(word => {
                        const wordW = ctx.measureText(word + ' ').width;
                        if (cx + wordW > canvas.width - margin && cx > startX) {
                            cx  = startX;
                            cy += fontSize * 1.35;
                        }
                        if (cy > canvas.height - 5) return; // fuera del canvas

                        textRevealQueue.push({
                            word,
                            x: cx, y: cy,
                            fontSize,
                            fontFamily,
                            textColor: fluidColorGenerator.generateRecursiveColor(0),
                        });
                        cx += wordW;
                    });
                }
            });

            // Mezclar para intercalar tamaños grandes y pequeños
            for (let i = textRevealQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [textRevealQueue[i], textRevealQueue[j]] = [textRevealQueue[j], textRevealQueue[i]];
            }
        }

        // Dibuja la próxima palabra de la cola
        function revealNextWord() {
            if (textRevealQueue.length === 0) return;
            const cell = textRevealQueue.shift();

            ctx.font = `${cell.fontSize}px ${cell.fontFamily}`;

            // Sombra opcional (30 %)
            if (Math.random() > 0.7) {
                const sc = getFluidShadowColor(cell.textColor);
                ctx.fillStyle   = sc;
                ctx.globalAlpha = 0.45;
                ctx.fillText(cell.word, cell.x + (Math.random() - 0.5) * 3, cell.y + (Math.random() - 0.5) * 3);
                ctx.globalAlpha = 1;
            }

            ctx.fillStyle = cell.textColor;
            ctx.fillText(cell.word, cell.x, cell.y);
        }


        
        // Sistema de detección de colisiones
        function detectCollision(particle1, particle2) {
            const dx = particle1.x - particle2.x;
            const dy = particle1.y - particle2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const minDistance = Math.max(particle1.width, particle2.width) * 0.93;
            
            return distance < minDistance;
        }

        // Tipos de comportamiento en colisiones
        const CollisionBehaviors = {
            SURVIVE_BOTH: 'survive_both',    // Ambos siguen existiendo
            ABSORB: 'absorb',               // Uno absorbe al otro
            MERGE: 'merge',                 // Se fusionan en uno nuevo
            DESTROY_BOTH: 'destroy_both',   // Ambos se destruyen
            REPEL: 'repel',                 // Se repelen mutuamente
            PHASE_THROUGH: 'phase_through'  // Uno pasa a través del otro
        };

        // Función para decidir comportamiento de colisión
        function decideCollisionBehavior(particle1, particle2) {
            // Factores que influyen en la decisión
            const sizeDifference = Math.abs(particle1.width - particle2.width);
            const speedDifference = Math.abs(particle1.speed - particle2.speed);
            const energyParticle1 = particle1.speed * particle1.width;
            const energyParticle2 = particle2.speed * particle2.width;
            
            // Probabilidades basadas en características
            const rand = Math.random();
            
            // Si uno es mucho más grande que el otro
            if (sizeDifference > 50) {
                if (rand < 0.4) return CollisionBehaviors.ABSORB;
                if (rand < 0.7) return CollisionBehaviors.PHASE_THROUGH;
                return CollisionBehaviors.SURVIVE_BOTH;
            }
            
            // Si tienen energías similares
            if (Math.abs(energyParticle1 - energyParticle2) < 100) {
                if (rand < 0.25) return CollisionBehaviors.MERGE;
                if (rand < 0.45) return CollisionBehaviors.REPEL;
                if (rand < 0.65) return CollisionBehaviors.SURVIVE_BOTH;
                if (rand < 0.85) return CollisionBehaviors.PHASE_THROUGH;
                return CollisionBehaviors.DESTROY_BOTH;
            }
            
            // Si uno tiene mucha más energía
            if (energyParticle1 > energyParticle2 * 2 || energyParticle2 > energyParticle1 * 2) {
                if (rand < 0.5) return CollisionBehaviors.ABSORB;
                if (rand < 0.8) return CollisionBehaviors.SURVIVE_BOTH;
                return CollisionBehaviors.REPEL;
            }
            
            // Comportamiento por defecto
            if (rand < 0.3) return CollisionBehaviors.SURVIVE_BOTH;
            if (rand < 0.5) return CollisionBehaviors.REPEL;
            if (rand < 0.7) return CollisionBehaviors.PHASE_THROUGH;
            if (rand < 0.85) return CollisionBehaviors.MERGE;
            return CollisionBehaviors.ABSORB;
        }

        // Función para ejecutar el comportamiento de colisión
        function executeCollisionBehavior(behavior, particle1, particle2, particleIndex1, particleIndex2) {
          
            
            switch (behavior) {
                case CollisionBehaviors.SURVIVE_BOTH:
                    // Ambos cambian ligeramente de dirección
                    particle1.direction.x += (Math.random() - 0.5) * 0.5;
                    particle1.direction.y += (Math.random() - 0.5) * 0.5;
                    particle2.direction.x += (Math.random() - 0.5) * 0.5;
                    particle2.direction.y += (Math.random() - 0.5) * 0.5;
                    break;
                    
                case CollisionBehaviors.ABSORB:
                    // La partícula más grande absorbe a la más pequeña
                    if (particle1.width >= particle2.width) {
                        particle1.width += particle2.width * 0.3;
                        particle1.height += particle2.height * 0.3;
                        particle1.speed += particle2.speed * 0.1;
                        particle1.maxDistance += particle2.maxDistance * 0.5;
                        // Marcar la segunda partícula para eliminación
                        particle2.toDelete = true;
                    } else {
                        particle2.width += particle1.width * 0.3;
                        particle2.height += particle1.height * 0.3;
                        particle2.speed += particle1.speed * 0.1;
                        particle2.maxDistance += particle1.maxDistance * 0.5;
                        // Marcar la primera partícula para eliminación
                        particle1.toDelete = true;
                    }
                    break;
                    
                case CollisionBehaviors.MERGE:
                    // Crear una nueva partícula en el punto medio
                    const newParticle = new SequencedTextParticle({
                        x: (particle1.x + particle2.x) / 2,
                        y: (particle1.y + particle2.y) / 2,
                        width: (particle1.width + particle2.width) / 2,
                        height: (particle1.height + particle2.height) / 2,
                        direction: {
                            x: (particle1.direction.x + particle2.direction.x) / 2,
                            y: (particle1.direction.y + particle2.direction.y) / 2
                        },
                        arc: {
                            x: (particle1.arc.x + particle2.arc.x) / 2,
                            y: (particle1.arc.y + particle2.arc.y) / 2
                        },
                        speed: (particle1.speed + particle2.speed) / 2,
                        maxDistance: (particle1.maxDistance + particle2.maxDistance) / 2,
                        colorShift: {
                            r: (particle1.colorShift.r + particle2.colorShift.r) / 2,
                            g: (particle1.colorShift.g + particle2.colorShift.g) / 2,
                            b: (particle1.colorShift.b + particle2.colorShift.b) / 2
                        }
                    });
                    
                    // Marcar ambas partículas originales para eliminación
                    particle1.toDelete = true;
                    particle2.toDelete = true;
                    
                    // Agregar la nueva partícula
                    particles.push(newParticle);
                    break;
                    
                case CollisionBehaviors.DESTROY_BOTH:
                    // Ambas partículas se destruyen
                    particle1.toDelete = true;
                    particle2.toDelete = true;
                    
                    // Crear efecto de explosión con partículas pequeñas
                    for (let i = 0; i < 3; i++) {
                        particles.push(new SequencedTextParticle({
                            x: particle1.x + (Math.random() - 0.5) * 50,
                            y: particle1.y + (Math.random() - 0.5) * 50,
                            width: 20 + Math.random() * 20,
                            height: 20 + Math.random() * 20,
                            direction: {
                                x: (Math.random() - 0.5) * 2,
                                y: (Math.random() - 0.5) * 2
                            },
                            arc: {
                                x: (Math.random() - 0.9) * 0.1,
                                y: (Math.random() - 0.7) * 0.1
                            },
                            speed: 0.5 + Math.random() * 0.5,
                            maxDistance: 50 + Math.random() * 120,
                            colorShift: {
                                r: Math.random() * 100 - 50,
                                g: Math.random() * 100 - 50,
                                b: Math.random() * 100 - 50
                            }
                        }));
                    }
                    break;
                    
                case CollisionBehaviors.REPEL:
                    // Se repelen mutuamente
                    const repelForce = 1;
                    const dx = particle2.x - particle1.x;
                    const dy = particle2.y - particle1.y;
                    const distance = Math.sqrt(dx * dx + dy * dy) || 1;
                    
                    particle1.direction.x -= (dx / distance) * repelForce;
                    particle1.direction.y -= (dy / distance) * repelForce;
                    particle2.direction.x += (dx / distance) * repelForce;
                    particle2.direction.y += (dy / distance) * repelForce;
                    break;
                    
                case CollisionBehaviors.PHASE_THROUGH:
                    // Una partícula "pasa a través" de la otra sin afectarse
                    // Solo cambiar ligeramente los colores para indicar la interacción
                    particle1.colorShift.r += (Math.random() - 0.5) * 20;
                    particle1.colorShift.g += (Math.random() - 0.5) * 20;
                    particle1.colorShift.b += (Math.random() - 0.5) * 20;
                    particle2.colorShift.r += (Math.random() - 0.5) * 20;
                    particle2.colorShift.g += (Math.random() - 0.5) * 20;
                    particle2.colorShift.b += (Math.random() - 0.5) * 20;
                    break;
            }
        }

        // Clase Particle extendida con sistema de colisiones y velocidad reducida
        class SequencedTextParticle {
            constructor(options) {
                Object.assign(this, options);
                this.done = false;
                this.distance = 0;
                this.params = {};
                Object.assign(this.params, options);
                this.trail = [];
                this.toDelete = false;
                this.collisionCooldown = 0; // Evitar colisiones múltiples rápidas
            }

            reset() {
                Object.assign(this, this.params);
                this.done = false;
                this.distance = 0;
                this.trail = [];
                this.toDelete = false;
                this.collisionCooldown = 0;
                this.x = random(canvas.width);
                this.y = random(canvas.height);
            }

            draw() {
                if (this.done || this.toDelete) {
                    if (!this.toDelete) {
                        this.reset();
                    }
                    return;
                }

                // Reducir cooldown de colisión
                if (this.collisionCooldown > 0) {
                    this.collisionCooldown--;
                }

                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 55) {
                    this.trail.shift();
                }

                let captureWidth = Math.min(this.width, canvas.width - this.x);
                let captureHeight = Math.min(this.height, canvas.height - this.y);
                
                if (captureWidth > 0 && captureHeight > 0 && this.x >= 0 && this.y >= 0) {
                    let imageData = ctx.getImageData(this.x, this.y, captureWidth, captureHeight);
                    let data = imageData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        if (Math.random() > 0.9) {
                            data[i] = Math.min(255, Math.max(0, data[i] + this.colorShift.r));
                            data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + this.colorShift.g));
                            data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + this.colorShift.b));
                            
                            if (Math.random() > 0.9) {
                                data[i] = random(255);
                                data[i + 1] = random(255);
                                data[i + 2] = random(255);
                            }
                        }
                    }
                    
                    let newX = this.x + this.direction.x;
                    let newY = this.y + this.direction.y;
                    
                    if (newX < 0) newX = canvas.width + newX;
                    if (newX >= canvas.width) newX = newX - canvas.width;
                    if (newY < 0) newY = canvas.height + newY;
                    if (newY >= canvas.height) newY = newY - canvas.height;
                    
                    ctx.putImageData(imageData, newX, newY);
                }

                this.x += this.direction.x * this.speed;
                this.y += this.direction.y * this.speed;
                this.direction.x += this.arc.x;
                this.direction.y += this.arc.y;

                // Reducir la frecuencia de cambios aleatorios
                if (Math.random() > 0.78) {
                    this.direction.x += (Math.random() - 0.5) * 0.5;
                    this.direction.y += (Math.random() - 0.5) * 0.5;
                }

                this.distance++;
                if (this.distance > this.maxDistance) {
                    this.done = true;
                }
            }
        }

    // ✨ GENERAR PARÁMETROS ESPECÍFICOS PARA CADA FORMA
generateShapeParameters() {
    switch (this.geometryType) {
        case 'trapezoid':
            return {
                topWidth: this.width * (0.6 + Math.random() * 0.4),
                bottomWidth: this.width * (0.8 + Math.random() * 0.4),
                skew: (Math.random() - 0.5) * 0.3
            };
            
        case 'parallelogram':
            return {
                skewX: (Math.random() - 0.5) * 0.5,
                skewY: (Math.random() - 0.5) * 0.3
            };
            
        case 'rhombus':
            return {
                angle: Math.random() * Math.PI * 2,
                ratio: 0.6 + Math.random() * 0.8
            };
            
        case 'irregular':
            return {
                vertices: this.generateIrregularVertices(),
                distortion: 0.2 + Math.random() * 0.6
            };
            
        case 'triangle':
            return {
                type: Math.floor(Math.random() * 3), // 0: equilátero, 1: isósceles, 2: escaleno
                rotation: Math.random() * Math.PI * 2
            };
            
        case 'pentagon':
            return {
                irregularity: 0.3 + Math.random() * 0.4,
                rotation: Math.random() * Math.PI * 2
            };
            
        default: // rectangle
            return {};
    }
}

chooseSizeChangeType() {
    const types = [
        'stable',        // Tamaño constante
        'pulse',         // Pulso rítmico
        'grow',          // Crecimiento gradual
        'shrink',        // Reducción gradual
        'oscillate',     // Oscilación
        'random_jump',   // Saltos aleatorios
        'wave',          // Ondulación suave
        'spiral'         // Cambio en espiral
    ];
    return types[Math.floor(Math.random() * types.length)];
}

updateSize() {
    switch (this.sizeChangeType) {
        case 'stable':
            // No cambiar tamaño
            break;
            
        case 'pulse':
            const pulseMultiplier = 1 + Math.sin(this.age * this.sizeChangeSpeed * 0.1) * this.sizeChangeIntensity;
            this.width = this.originalWidth * pulseMultiplier;
            this.height = this.originalHeight * pulseMultiplier;
            break;
            
        case 'grow':
            const growthRate = 1 + (this.age * 0.001 * this.sizeChangeSpeed);
            this.width = Math.min(this.originalWidth * growthRate, this.originalWidth * 2);
            this.height = Math.min(this.originalHeight * growthRate, this.originalHeight * 2);
            break;
            
        case 'shrink':
            const shrinkRate = Math.max(0.3, 1 - (this.age * 0.001 * this.sizeChangeSpeed));
            this.width = this.originalWidth * shrinkRate;
            this.height = this.originalHeight * shrinkRate;
            break;
            
        case 'oscillate':
            const oscillateX = 1 + Math.sin(this.age * this.sizeChangeSpeed * 0.08) * this.sizeChangeIntensity;
            const oscillateY = 1 + Math.cos(this.age * this.sizeChangeSpeed * 0.12) * this.sizeChangeIntensity;
            this.width = this.originalWidth * oscillateX;
            this.height = this.originalHeight * oscillateY;
            break;
            
        case 'random_jump':
            if (Math.random() > 0.98) { // 2% probabilidad de salto
                const jumpX = 0.5 + Math.random() * 1.5;
                const jumpY = 0.5 + Math.random() * 1.5;
                this.width = this.originalWidth * jumpX;
                this.height = this.originalHeight * jumpY;
            }
            break;
            
        case 'wave':
            const waveX = 1 + Math.sin(this.age * 0.05 + this.x * 0.01) * this.sizeChangeIntensity;
            const waveY = 1 + Math.cos(this.age * 0.07 + this.y * 0.01) * this.sizeChangeIntensity;
            this.width = this.originalWidth * waveX;
            this.height = this.originalHeight * waveY;
            break;
            
        case 'spiral':
            const spiralAngle = this.age * 0.02;
            const spiralRadius = 1 + Math.sin(spiralAngle) * this.sizeChangeIntensity;
            const spiralX = 1 + Math.cos(spiralAngle * 1.3) * this.sizeChangeIntensity * 0.5;
            this.width = this.originalWidth * spiralRadius * spiralX;
            this.height = this.originalHeight * spiralRadius;
            break;
    }
    
    // Asegurar límites mínimos y máximos
    this.width = Math.max(10, Math.min(300, this.width));
    this.height = Math.max(10, Math.min(300, this.height));
}

// Método mejorado para cambiar comportamientos
changeSizeChangeType() {
    const oldType = this.sizeChangeType;
    this.sizeChangeType = this.chooseSizeChangeType();
    this.sizeChangeSpeed = 0.5 + Math.random() * 1.5;
    this.sizeChangeIntensity = 0.1 + Math.random() * 0.4;
    
    return this.sizeChangeType;
}

generateIrregularVertices() {
    const numVertices = 4 + Math.floor(Math.random() * 4); // 4-7 vértices
    const vertices = [];
    
    for (let i = 0; i < numVertices; i++) {
        const angle = (i / numVertices) * Math.PI * 2;
        const radius = 0.5 + Math.random() * 0.5;
        vertices.push({
            x: Math.cos(angle) * radius,
            y: Math.sin(angle) * radius
        });
    }
    
    return vertices;
}

    // ✨ OBTENER REGIÓN DE CAPTURA SEGÚN LA FORMA
    getCaptureRegion(x, y, width, height) {
        switch (this.geometryType) {
            case 'rectangle':
                return this.getRectangleRegion(x, y, width, height);
                
            case 'trapezoid':
                return this.getTrapezoidRegion(x, y, width, height);
                
            case 'parallelogram':
                return this.getParallelogramRegion(x, y, width, height);
                
            case 'rhombus':
                return this.getRhombusRegion(x, y, width, height);
                
            case 'irregular':
                return this.getIrregularRegion(x, y, width, height);
                
            case 'triangle':
                return this.getTriangleRegion(x, y, width, height);
                
            case 'pentagon':
                return this.getPentagonRegion(x, y, width, height);
                
            default:
                return this.getRectangleRegion(x, y, width, height);
        }
    }

    // ✨ REGIONES ESPECÍFICAS PARA CADA FORMA
    getRectangleRegion(x, y, width, height) {
        return [{
            x: Math.max(0, Math.min(x, canvas.width - width)),
            y: Math.max(0, Math.min(y, canvas.height - height)),
            width: Math.min(width, canvas.width - x),
            height: Math.min(height, canvas.height - y)
        }];
    }

    getTrapezoidRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const topWidth = params.topWidth;
        const bottomWidth = params.bottomWidth;
        const skew = params.skew;
        
        // Dividir el trapecio en múltiples rectángulos horizontales
        const slices = 8;
        const regions = [];
        
        for (let i = 0; i < slices; i++) {
            const ratio = i / slices;
            const sliceWidth = topWidth + (bottomWidth - topWidth) * ratio;
            const sliceX = x + (width - sliceWidth) / 2 + skew * ratio * width;
            const sliceY = y + (height / slices) * i;
            const sliceHeight = height / slices;
            
            if (sliceX >= 0 && sliceY >= 0 && sliceX + sliceWidth <= canvas.width && sliceY + sliceHeight <= canvas.height) {
                regions.push({
                    x: sliceX,
                    y: sliceY,
                    width: sliceWidth,
                    height: sliceHeight
                });
            }
        }
        
        return regions;
    }

    getParallelogramRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const skewX = params.skewX;
        const skewY = params.skewY;
        
        // Dividir en franjas inclinadas
        const slices = 6;
        const regions = [];
        
        for (let i = 0; i < slices; i++) {
            const ratio = i / slices;
            const sliceX = x + skewX * ratio * width;
            const sliceY = y + skewY * ratio * height + (height / slices) * i;
            const sliceWidth = width / slices;
            const sliceHeight = height / slices;
            
            if (sliceX >= 0 && sliceY >= 0 && sliceX + sliceWidth <= canvas.width && sliceY + sliceHeight <= canvas.height) {
                regions.push({
                    x: sliceX,
                    y: sliceY,
                    width: sliceWidth,
                    height: sliceHeight
                });
            }
        }
        
        return regions;
    }

    getRhombusRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const centerX = x + width / 2;
        const centerY = y + height / 2;
        
        // Dividir el rombo en rectángulos concéntricos
        const rings = 5;
        const regions = [];
        
        for (let ring = 0; ring < rings; ring++) {
            const ratio = (ring + 1) / rings;
            const ringWidth = width * ratio * 0.7;
            const ringHeight = height * ratio * params.ratio;
            
            const ringX = centerX - ringWidth / 2;
            const ringY = centerY - ringHeight / 2;
            
            if (ringX >= 0 && ringY >= 0 && ringX + ringWidth <= canvas.width && ringY + ringHeight <= canvas.height) {
                regions.push({
                    x: ringX,
                    y: ringY,
                    width: ringWidth,
                    height: ringHeight
                });
            }
        }
        
        return regions;
    }

    getIrregularRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const vertices = params.vertices;
        const centerX = x + width / 2;
        const centerY = y + height / 2;
        
        // Aproximar la forma irregular con múltiples rectángulos pequeños
        const regions = [];
        const gridSize = 8;
        
        for (let gx = 0; gx < gridSize; gx++) {
            for (let gy = 0; gy < gridSize; gy++) {
                const localX = (gx / gridSize - 0.5) * 2; // -1 a 1
                const localY = (gy / gridSize - 0.5) * 2; // -1 a 1
                
                // Verificar si este punto está dentro de la forma irregular
                if (this.pointInIrregularShape(localX, localY, vertices)) {
                    const rectX = centerX + localX * width / 2;
                    const rectY = centerY + localY * height / 2;
                    const rectWidth = width / gridSize;
                    const rectHeight = height / gridSize;
                    
                    if (rectX >= 0 && rectY >= 0 && rectX + rectWidth <= canvas.width && rectY + rectHeight <= canvas.height) {
                        regions.push({
                            x: rectX,
                            y: rectY,
                            width: rectWidth,
                            height: rectHeight
                        });
                    }
                }
            }
        }
        
        return regions;
    }

    getTriangleRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const regions = [];
        
        // Dividir el triángulo en franjas horizontales
        const slices = 6;
        
        for (let i = 0; i < slices; i++) {
            const ratio = i / slices;
            let sliceWidth, sliceX;
            
            switch (params.type) {
                case 0: // Equilátero
                    sliceWidth = width * (1 - ratio);
                    sliceX = x + (width - sliceWidth) / 2;
                    break;
                case 1: // Isósceles
                    sliceWidth = width * (1 - ratio * 0.8);
                    sliceX = x + (width - sliceWidth) / 2;
                    break;
                default: // Escaleno
                    sliceWidth = width * (1 - ratio * (0.6 + Math.random() * 0.4));
                    sliceX = x + (Math.random() - 0.3) * width * 0.3;
                    break;
            }
            
            const sliceY = y + (height / slices) * i;
            const sliceHeight = height / slices;
            
            if (sliceX >= 0 && sliceY >= 0 && sliceX + sliceWidth <= canvas.width && sliceY + sliceHeight <= canvas.height) {
                regions.push({
                    x: sliceX,
                    y: sliceY,
                    width: sliceWidth,
                    height: sliceHeight
                });
            }
        }
        
        return regions;
    }

    getPentagonRegion(x, y, width, height) {
        const params = this.shapeParameters;
        const centerX = x + width / 2;
        const centerY = y + height / 2;
        const regions = [];
        
        // Crear un pentágono aproximado con rectángulos
        const angles = 5;
        for (let i = 0; i < angles; i++) {
            const angle = (i / angles) * Math.PI * 2 + params.rotation;
            const radius = (width + height) / 4;
            const irregularity = params.irregularity;
            
            const radiusVariation = 1 + (Math.random() - 0.5) * irregularity;
            const finalRadius = radius * radiusVariation;
            
            const pointX = centerX + Math.cos(angle) * finalRadius;
            const pointY = centerY + Math.sin(angle) * finalRadius;
            
            // Crear pequeños rectángulos alrededor de cada vértice
            const rectSize = Math.min(width, height) / 6;
            const rectX = pointX - rectSize / 2;
            const rectY = pointY - rectSize / 2;
            
            if (rectX >= 0 && rectY >= 0 && rectX + rectSize <= canvas.width && rectY + rectSize <= canvas.height) {
                regions.push({
                    x: rectX,
                    y: rectY,
                    width: rectSize,
                    height: rectSize
                });
            }
        }
        
        return regions;
    }

    // ✨ FUNCIÓN AUXILIAR PARA VERIFICAR SI UN PUNTO ESTÁ DENTRO DE UNA FORMA IRREGULAR
    pointInIrregularShape(x, y, vertices) {
        let inside = false;
        const n = vertices.length;
        
        for (let i = 0, j = n - 1; i < n; j = i++) {
            const xi = vertices[i].x, yi = vertices[i].y;
            const xj = vertices[j].x, yj = vertices[j].y;
            
            if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
                inside = !inside;
            }
        }
        
        return inside;
    }

    reset() {
        Object.assign(this, this.params);
        this.x = random(canvas.width);
        this.y = random(canvas.height);
        this.toDelete = false;
        this.age = 0;

  <meta name="description" content="This piece is a machine that watches through the pixel and pushes it, bifurcates it, lets it tremble. A black canvas, a malleable matrix: the texts that Tracery.js spits out are caught mid-air by JavaScript, shattered, painted, shadowed, and scattered again in floating fragments, each bearing the shadow of a collision that perhaps never occurred.

The system is double, like the things that survive: erratic particles seeking their path by crashing into each other, absorbing or destroying one another; distortions crawling like twisted glyphs, scratching the canvas with delay, with double strokes, as if time forked at every second.

This piece owes much to Kim Asendorf, d0n_xyz, and lilcode, who have deeply explored pixel manipulation in the browser. Here, Tracery.js prints the characters of bot, and JS plays with the screen’s pixels. The bot system is an old one I began working on in 2017 (https://canekzapata.net/twbot/index.html), and it spent some time posting on Twitter before the new management shut the door on such automations. It’s a bot I care for deeply, it must be said.

There is no plot, no scene, no voice guiding the whole, but rather a multiplication of machinic decisions without subject, a swarm of instructions producing effects without intent, where algorithms do not narrate, do not signify: they calculate. The particles are unaware they chase each other, unaware they leave traces. What happens is not representation but insistence: an insistence on collapse, on friction, on escape. Everything we call “expression” in language is here merely a thermodynamic drift.

It is not image art but failed translation, of light that doesn't fit the loops, of margins dissolving under pulses of code. JS does not display the text—it subjects it to a choreography of displacements where every letter becomes a noise on the screen, a shadow of something that may never have been said.

And if something remains, if anything persists, it is not meaning or form: it is the technical echo of a broken system that insists on becoming visible.

            let num = parseInt(color, 16);
            let r = (num >> 16) + amount;

        // Sistema de detección de colisiones
        function detectCollision(particle1, particle2) {
            const dx = particle1.x - particle2.x;
            const dy = particle1.y - particle2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const minDistance = Math.max(particle1.width, particle2.width) * 0.93;
            
            return distance < minDistance;
        }

        // Tipos de comportamiento en colisiones
        const CollisionBehaviors = {
            SURVIVE_BOTH: 'survive_both',    // Ambos siguen existiendo
            ABSORB: 'absorb',               // Uno absorbe al otro
            MERGE: 'merge',                 // Se fusionan en uno nuevo
            DESTROY_BOTH: 'destroy_both',   // Ambos se destruyen
            REPEL: 'repel',                 // Se repelen mutuamente
            PHASE_THROUGH: 'phase_through'  // Uno pasa a través del otro
        };

        // Función para decidir comportamiento de colisión
        function decideCollisionBehavior(particle1, particle2) {
            // Factores que influyen en la decisión
            const sizeDifference = Math.abs(particle1.width - particle2.width);
            const speedDifference = Math.abs(particle1.speed - particle2.speed);
            const energyParticle1 = particle1.speed * particle1.width;
            const energyParticle2 = particle2.speed * particle2.width;
            
            // Probabilidades basadas en características
            const rand = Math.random();
            
            // Si uno es mucho más grande que el otro
            if (sizeDifference > 50) {
                if (rand < 0.4) return CollisionBehaviors.ABSORB;
                if (rand < 0.7) return CollisionBehaviors.PHASE_THROUGH;
                return CollisionBehaviors.SURVIVE_BOTH;
            }
            
            // Si tienen energías similares
            if (Math.abs(energyParticle1 - energyParticle2) < 100) {
                if (rand < 0.25) return CollisionBehaviors.MERGE;
                if (rand < 0.45) return CollisionBehaviors.REPEL;
                if (rand < 0.65) return CollisionBehaviors.SURVIVE_BOTH;
                if (rand < 0.85) return CollisionBehaviors.PHASE_THROUGH;
                return CollisionBehaviors.DESTROY_BOTH;
            }
            
            // Si uno tiene mucha más energía
            if (energyParticle1 > energyParticle2 * 2 || energyParticle2 > energyParticle1 * 2) {
                if (rand < 0.5) return CollisionBehaviors.ABSORB;
                if (rand < 0.8) return CollisionBehaviors.SURVIVE_BOTH;
                return CollisionBehaviors.REPEL;
            }
            
            // Comportamiento por defecto
            if (rand < 0.3) return CollisionBehaviors.SURVIVE_BOTH;
            if (rand < 0.5) return CollisionBehaviors.REPEL;
            if (rand < 0.7) return CollisionBehaviors.PHASE_THROUGH;
            if (rand < 0.85) return CollisionBehaviors.MERGE;
            return CollisionBehaviors.ABSORB;
        }

        // Función para ejecutar el comportamiento de colisión
        function executeCollisionBehavior(behavior, particle1, particle2, particleIndex1, particleIndex2) {
          
            console.log(`💥 Colisión: ${behavior} entre partículas ${particleIndex1} y ${particleIndex2}`);
            
            switch (behavior) {
                case CollisionBehaviors.SURVIVE_BOTH:
                    // Ambos cambian ligeramente de dirección
                    particle1.direction.x += (Math.random() - 0.5) * 0.5;
                    particle1.direction.y += (Math.random() - 0.5) * 0.5;
                    particle2.direction.x += (Math.random() - 0.5) * 0.5;
                    particle2.direction.y += (Math.random() - 0.5) * 0.5;
                    break;
                    
                case CollisionBehaviors.ABSORB:
                    // La partícula más grande absorbe a la más pequeña
                    if (particle1.width >= particle2.width) {
                        particle1.width += particle2.width * 0.3;
                        particle1.height += particle2.height * 0.3;
                        particle1.speed += particle2.speed * 0.1;
                        particle1.maxDistance += particle2.maxDistance * 0.5;
                        // Marcar la segunda partícula para eliminación
                        particle2.toDelete = true;
                    } else {
                        particle2.width += particle1.width * 0.3;
                        particle2.height += particle1.height * 0.3;
                        particle2.speed += particle1.speed * 0.1;
                        particle2.maxDistance += particle1.maxDistance * 0.5;
                        // Marcar la primera partícula para eliminación
                        particle1.toDelete = true;
                    }
                    break;
                    
                case CollisionBehaviors.MERGE:
                    // Crear una nueva partícula en el punto medio
                    const newParticle = new SequencedTextParticle({
                        x: (particle1.x + particle2.x) / 2,
                        y: (particle1.y + particle2.y) / 2,
                        width: (particle1.width + particle2.width) / 2,
                        height: (particle1.height + particle2.height) / 2,
                        direction: {
                            x: (particle1.direction.x + particle2.direction.x) / 2,
                            y: (particle1.direction.y + particle2.direction.y) / 2
                        },
                        arc: {
                            x: (particle1.arc.x + particle2.arc.x) / 2,
                            y: (particle1.arc.y + particle2.arc.y) / 2
                        },
                        speed: (particle1.speed + particle2.speed) / 2,
                        maxDistance: (particle1.maxDistance + particle2.maxDistance) / 2,
                        colorShift: {
                            r: (particle1.colorShift.r + particle2.colorShift.r) / 2,
                            g: (particle1.colorShift.g + particle2.colorShift.g) / 2,
                            b: (particle1.colorShift.b + particle2.colorShift.b) / 2
                        }
                    });
                    
                    // Marcar ambas partículas originales para eliminación
                    particle1.toDelete = true;
                    particle2.toDelete = true;
                    
                    // Agregar la nueva partícula
                    particles.push(newParticle);
                    break;
                    
                case CollisionBehaviors.DESTROY_BOTH:
                    // Ambas partículas se destruyen
                    particle1.toDelete = true;
                    particle2.toDelete = true;
                    
                    // Crear efecto de explosión con partículas pequeñas
                    for (let i = 0; i < 3; i++) {
                        particles.push(new SequencedTextParticle({
                            x: particle1.x + (Math.random() - 0.5) * 50,
                            y: particle1.y + (Math.random() - 0.5) * 50,
                            width: 20 + Math.random() * 20,
                            height: 20 + Math.random() * 20,
                            direction: {
                                x: (Math.random() - 0.5) * 2,
                                y: (Math.random() - 0.5) * 2
                            },
                            arc: {
                                x: (Math.random() - 0.9) * 0.1,
                                y: (Math.random() - 0.7) * 0.1
                            },
                            speed: 0.5 + Math.random() * 0.5,
                            maxDistance: 50 + Math.random() * 120,
                            colorShift: {
                                r: Math.random() * 100 - 50,
                                g: Math.random() * 100 - 50,
                                b: Math.random() * 100 - 50
                            }
                        }));
                    }
                    break;
                    
                case CollisionBehaviors.REPEL:
                    // Se repelen mutuamente
                    const repelForce = 1;
                    const dx = particle2.x - particle1.x;
                    const dy = particle2.y - particle1.y;
                    const distance = Math.sqrt(dx * dx + dy * dy) || 1;
                    
                    particle1.direction.x -= (dx / distance) * repelForce;
                    particle1.direction.y -= (dy / distance) * repelForce;
                    particle2.direction.x += (dx / distance) * repelForce;
                    particle2.direction.y += (dy / distance) * repelForce;
                    break;
                    
                case CollisionBehaviors.PHASE_THROUGH:
                    // Una partícula "pasa a través" de la otra sin afectarse
                    // Solo cambiar ligeramente los colores para indicar la interacción
                    particle1.colorShift.r += (Math.random() - 0.5) * 20;
                    particle1.colorShift.g += (Math.random() - 0.5) * 20;
                    particle1.colorShift.b += (Math.random() - 0.5) * 20;
                    particle2.colorShift.r += (Math.random() - 0.5) * 20;
                    particle2.colorShift.g += (Math.random() - 0.5) * 20;
                    particle2.colorShift.b += (Math.random() - 0.5) * 20;
                    break;
            }
        }

        // Clase Particle extendida con sistema de colisiones y velocidad reducida
        class SequencedTextParticle {
            constructor(options) {
                Object.assign(this, options);
                this.done = false;
                this.distance = 0;
                this.params = {};
                Object.assign(this.params, options);
                this.trail = [];
                this.toDelete = false;
                this.collisionCooldown = 0; // Evitar colisiones múltiples rápidas
            }

            reset() {
                Object.assign(this, this.params);
                this.done = false;
                this.distance = 0;
                this.trail = [];
                this.toDelete = false;
                this.collisionCooldown = 0;
                this.x = random(canvas.width);
                this.y = random(canvas.height);
            }

            draw() {
                if (this.done || this.toDelete) {
                    if (!this.toDelete) {
                        this.reset();
                    }
                    return;
                }

                // Reducir cooldown de colisión
                if (this.collisionCooldown > 0) {
                    this.collisionCooldown--;
                }

                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 55) {
                    this.trail.shift();
                }

                let captureWidth = Math.min(this.width, canvas.width - this.x);
                let captureHeight = Math.min(this.height, canvas.height - this.y);
                
                if (captureWidth > 0 && captureHeight > 0 && this.x >= 0 && this.y >= 0) {
                    let imageData = ctx.getImageData(this.x, this.y, captureWidth, captureHeight);
                    let data = imageData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        if (Math.random() > 0.9) {
                            data[i] = Math.min(255, Math.max(0, data[i] + this.colorShift.r));
                            data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + this.colorShift.g));
                            data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + this.colorShift.b));
                            
                            if (Math.random() > 0.9) {
                                data[i] = random(255);
                                data[i + 1] = random(255);
                                data[i + 2] = random(255);
                            }
                        }
                    }
                    
                    let newX = this.x + this.direction.x;
                    let newY = this.y + this.direction.y;
                    
                    if (newX < 0) newX = canvas.width + newX;
                    if (newX >= canvas.width) newX = newX - canvas.width;
                    if (newY < 0) newY = canvas.height + newY;
                    if (newY >= canvas.height) newY = newY - canvas.height;
                    
                    ctx.putImageData(imageData, newX, newY);
                }

                this.x += this.direction.x * this.speed;
                this.y += this.direction.y * this.speed;
                this.direction.x += this.arc.x;
                this.direction.y += this.arc.y;

                // Reducir la frecuencia de cambios aleatorios
                if (Math.random() > 0.78) {
                    this.direction.x += (Math.random() - 0.5) * 0.5;
                    this.direction.y += (Math.random() - 0.5) * 0.5;
                }

                this.distance++;
                if (this.distance > this.maxDistance) {
                    this.done = true;
                }
            }
        }

chooseSizeChangeType() {
    const types = [
        'stable',        // Tamaño constante
        'pulse',         // Pulso rítmico
        'grow',          // Crecimiento gradual
        'shrink',        // Reducción gradual
        'oscillate',     // Oscilación
        'random_jump',   // Saltos aleatorios
        'wave',          // Ondulación suave
        'spiral'         // Cambio en espiral
    ];
    return types[Math.floor(Math.random() * types.length)];
}

updateSize() {
    switch (this.sizeChangeType) {
        case 'stable':
            // No cambiar tamaño
            break;
            
        case 'pulse':
            const pulseMultiplier = 1 + Math.sin(this.age * this.sizeChangeSpeed * 0.1) * this.sizeChangeIntensity;
            this.width = this.originalWidth * pulseMultiplier;
            this.height = this.originalHeight * pulseMultiplier;
            break;
            
        case 'grow':
            const growthRate = 1 + (this.age * 0.001 * this.sizeChangeSpeed);
            this.width = Math.min(this.originalWidth * growthRate, this.originalWidth * 2);
            this.height = Math.min(this.originalHeight * growthRate, this.originalHeight * 2);
            break;
            
        case 'shrink':
            const shrinkRate = Math.max(0.3, 1 - (this.age * 0.001 * this.sizeChangeSpeed));
            this.width = this.originalWidth * shrinkRate;
            this.height = this.originalHeight * shrinkRate;
            break;
            
        case 'oscillate':
            const oscillateX = 1 + Math.sin(this.age * this.sizeChangeSpeed * 0.08) * this.sizeChangeIntensity;
            const oscillateY = 1 + Math.cos(this.age * this.sizeChangeSpeed * 0.12) * this.sizeChangeIntensity;
            this.width = this.originalWidth * oscillateX;
            this.height = this.originalHeight * oscillateY;
            break;
            
        case 'random_jump':
            if (Math.random() > 0.98) { // 2% probabilidad de salto
                const jumpX = 0.5 + Math.random() * 1.5;
                const jumpY = 0.5 + Math.random() * 1.5;
                this.width = this.originalWidth * jumpX;
                this.height = this.originalHeight * jumpY;
            }
            break;
            
        case 'wave':
            const waveX = 1 + Math.sin(this.age * 0.05 + this.x * 0.01) * this.sizeChangeIntensity;
            const waveY = 1 + Math.cos(this.age * 0.07 + this.y * 0.01) * this.sizeChangeIntensity;
            this.width = this.originalWidth * waveX;
            this.height = this.originalHeight * waveY;
            break;
            
        case 'spiral':
            const spiralAngle = this.age * 0.02;
            const spiralRadius = 1 + Math.sin(spiralAngle) * this.sizeChangeIntensity;
            const spiralX = 1 + Math.cos(spiralAngle * 1.3) * this.sizeChangeIntensity * 0.5;
            this.width = this.originalWidth * spiralRadius * spiralX;
            this.height = this.originalHeight * spiralRadius;
            break;
    }
    
    // Asegurar límites mínimos y máximos
    this.width = Math.max(10, Math.min(300, this.width));
    this.height = Math.max(10, Math.min(300, this.height));
}

// Método mejorado para cambiar comportamientos
changeSizeChangeType() {
    const oldType = this.sizeChangeType;
    this.sizeChangeType = this.chooseSizeChangeType();
    this.sizeChangeSpeed = 0.5 + Math.random() * 1.5;
    this.sizeChangeIntensity = 0.1 + Math.random() * 0.4;
    
    console.log(`🔄 Distorsión cambió de ${oldType} a ${this.sizeChangeType}`);
    return this.sizeChangeType;
}

generateIrregularVertices() {
    const numVertices = 4 + Math.floor(Math.random() * 4); // 4-7 vértices
    const vertices = [];
    
    for (let i = 0; i < numVertices; i++) {
        const angle = (i / numVertices) * Math.PI * 2;
        const radius = 0.5 + Math.random() * 0.5;
        vertices.push({
            x: Math.cos(angle) * radius,
            y: Math.sin(angle) * radius
        });
    }
    
    return vertices;
}

// 3. AÑADIR ESTAS FUNCIONES NUEVAS A TU CLASE:
getCaptureRegion(x, y, width, height) {
    switch (this.geometryType) {
        case 'rectangle':
            return this.getRectangleRegion(x, y, width, height);
        case 'trapezoid':
            return this.getTrapezoidRegion(x, y, width, height);
        case 'parallelogram':
            return this.getParallelogramRegion(x, y, width, height);
        case 'rhombus':
            return this.getRhombusRegion(x, y, width, height);
        case 'irregular':
            return this.getIrregularRegion(x, y, width, height);
        case 'triangle':
            return this.getTriangleRegion(x, y, width, height);
        case 'pentagon':
            return this.getPentagonRegion(x, y, width, height);
        default:
            return this.getRectangleRegion(x, y, width, height);
    }
}

getRectangleRegion(x, y, width, height) {
    return [{
        x: Math.max(0, Math.min(x, canvas.width - width)),
        y: Math.max(0, Math.min(y, canvas.height - height)),
        width: Math.min(width, canvas.width - x),
        height: Math.min(height, canvas.height - y)
    }];
}

getTrapezoidRegion(x, y, width, height) {
    const params = this.shapeParameters;
    const topWidth = params.topWidth;
    const bottomWidth = params.bottomWidth;
    const skew = params.skew;
    
    const slices = 6;
    const regions = [];
    
    for (let i = 0; i < slices; i++) {
        const ratio = i / slices;
        const sliceWidth = topWidth + (bottomWidth - topWidth) * ratio;
        const sliceX = x + (width - sliceWidth) / 2 + skew * ratio * width;
        const sliceY = y + (height / slices) * i;
        const sliceHeight = height / slices;
        
        if (sliceX >= 0 && sliceY >= 0 && sliceX + sliceWidth <= canvas.width && sliceY + sliceHeight <= canvas.height) {
            regions.push({
                x: sliceX,
                y: sliceY,
                width: sliceWidth,
                height: sliceHeight
            });
        }
    }
    
    return regions;
}

getParallelogramRegion(x, y, width, height) {
    const params = this.shapeParameters;
    const skewX = params.skewX;
    const skewY = params.skewY;
    
    const slices = 4;
    const regions = [];
    
    for (let i = 0; i < slices; i++) {
        const ratio = i / slices;
        const sliceX = x + skewX * ratio * width;
        const sliceY = y + skewY * ratio * height + (height / slices) * i;
        const sliceWidth = width / slices;
        const sliceHeight = height / slices;
        
        if (sliceX >= 0 && sliceY >= 0 && sliceX + sliceWidth <= canvas.width && sliceY + sliceHeight <= canvas.height) {
            regions.push({
                x: sliceX,
                y: sliceY,
                width: sliceWidth,
                height: sliceHeight
            });
        }
    }
    
    return regions;
}

getRhombusRegion(x, y, width, height) {
    const params = this.shapeParameters;
    const centerX = x + width / 2;
    const centerY = y + height / 2;
    
    const rings = 4;
    const regions = [];
    
    for (let ring = 0; ring < rings; ring++) {
        const ratio = (ring + 1) / rings;
        const ringWidth = width * ratio * 0.7;
        const ringHeight = height * ratio * params.ratio;
        
        const ringX = centerX - ringWidth / 2;
        const ringY = centerY - ringHeight / 2;
        
        if (ringX >= 0 && ringY >= 0 && ringX + ringWidth <= canvas.width && ringY + ringHeight <= canvas.height) {
            regions.push({
                x: ringX,
                y: ringY,
                width: ringWidth,
                height: ringHeight
            });
        }
    }
    
    return regions;
}

getTriangleRegion(x, y, width, height) {
    const params = this.shapeParameters;
    const regions = [];
    const slices = 5;
    
    for (let i = 0; i < slices; i++) {
        const ratio = i / slices;
        let sliceWidth, sliceX;
        
        switch (params.type) {
            case 0: // Equilátero
                sliceWidth = width * (1 - ratio);
                sliceX = x + (width - sliceWidth) / 2;
                break;
            case 1: // Isósceles
                sliceWidth = width * (1 - ratio * 0.8);
                sliceX = x + (width - sliceWidth) / 2;
                break;
            default: // Escaleno
                sliceWidth = width * (1 - ratio * (0.6 + Math.random() * 0.4));
                sliceX = x + (Math.random() - 0.3) * width * 0.3;
                break;
        }
        
        const sliceY = y + (height / slices) * i;
        const sliceHeight = height / slices;
        
        if (sliceX >= 0 && sliceY >= 0 && sliceX + sliceWidth <= canvas.width && sliceY + sliceHeight <= canvas.height) {
            regions.push({
                x: sliceX,
                y: sliceY,
                width: sliceWidth,
                height: sliceHeight
            });
        }
    }
    
    return regions;
}

getIrregularRegion(x, y, width, height) {
    const params = this.shapeParameters;
    const vertices = params.vertices;
    const centerX = x + width / 2;
    const centerY = y + height / 2;
    
    const regions = [];
    const gridSize = 6;
    
    for (let gx = 0; gx < gridSize; gx++) {
        for (let gy = 0; gy < gridSize; gy++) {
            const localX = (gx / gridSize - 0.5) * 2;
            const localY = (gy / gridSize - 0.5) * 2;
            
            if (this.pointInIrregularShape(localX, localY, vertices)) {
                const rectX = centerX + localX * width / 2;
                const rectY = centerY + localY * height / 2;
                const rectWidth = width / gridSize;
                const rectHeight = height / gridSize;
                
                if (rectX >= 0 && rectY >= 0 && rectX + rectWidth <= canvas.width && rectY + rectHeight <= canvas.height) {
                    regions.push({
                        x: rectX,
                        y: rectY,
                        width: rectWidth,
                        height: rectHeight
                    });
                }
            }
        }
    }
    
    return regions;
}

getPentagonRegion(x, y, width, height) {
    const params = this.shapeParameters;
    const centerX = x + width / 2;
    const centerY = y + height / 2;
    const regions = [];
    
    const angles = 5;
    for (let i = 0; i < angles; i++) {
        const angle = (i / angles) * Math.PI * 2 + params.rotation;
        const radius = (width + height) / 4;
        const irregularity = params.irregularity;
        
        const radiusVariation = 1 + (Math.random() - 0.5) * irregularity;
        const finalRadius = radius * radiusVariation;
        
        const pointX = centerX + Math.cos(angle) * finalRadius;
        const pointY = centerY + Math.sin(angle) * finalRadius;
        
        const rectSize = Math.min(width, height) / 6;
        const rectX = pointX - rectSize / 2;
        const rectY = pointY - rectSize / 2;
        
        if (rectX >= 0 && rectY >= 0 && rectX + rectSize <= canvas.width && rectY + rectSize <= canvas.height) {
            regions.push({
                x: rectX,
                y: rectY,
                width: rectSize,
                height: rectSize
            });
        }
    }
    
    return regions;
}

pointInIrregularShape(x, y, vertices) {
    let inside = false;
    const n = vertices.length;
    
    for (let i = 0, j = n - 1; i < n; j = i++) {
        const xi = vertices[i].x, yi = vertices[i].y;
        const xj = vertices[j].x, yj = vertices[j].y;
        
        if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
            inside = !inside;
        }
    }
    
    return inside;
}

// 4. AÑADIR EFECTOS ESPECÍFICOS POR FORMA:
applyShapeSpecificEffects(imageData, change) {
    const data = imageData.data;
    
    switch (this.geometryType) {

                    data[i + 1] = Math.min(255, Math.max(0, r * Math.sin(angle) + g * Math.cos(angle)));

        case 'irregular':

                }
            }
            break;
            
            default: // rectangle y cualquier otra forma
                // ✨ LLAMAR AL NUEVO MÉTODO AQUÍ:
                this.applyFluidColorEffects(imageData, change);
                
                // Efectos estándar mejorados
                for (let i = 0; i < data.length; i += 4) {
